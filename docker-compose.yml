version: '3.8'

services:
  db:
    image: postgres:15
    container_name: fraud_guard_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fraud_guard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fraud_guard"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fraud_guard_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fraud_guard
      KODIK_API_KEY: ${KODIK_API_KEY}
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  bot:
    build: .
    container_name: fraud_guard_bot
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fraud_guard
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      KODIK_API_KEY: ${KODIK_API_KEY}
    env_file:
      - .env
    command: ["python", "-m", "src.bot.telegram_bot"]

  dashboard:
    build: .
    container_name: fraud_guard_dashboard
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8000/api/v1
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "src/dashboard/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]

volumes:
  postgres_data:
